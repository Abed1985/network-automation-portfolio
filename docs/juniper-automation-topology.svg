  <text x="1160" y="362" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">No committed passwords</text>
  <text x="1160" y="388" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">Dry-run by default</text>
  <text x="1160" y="414" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">Explicit commit flags</text>
