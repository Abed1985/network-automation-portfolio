  <text x="770" y="276" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">commit confirmed and rollback</text>
  <rect x="620" y="390" width="300" height="150" rx="14" fill="#ffffff" stroke="#b9c3d2" stroke-width="2"/>
