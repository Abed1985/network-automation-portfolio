  <text x="770" y="490" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">ISIS config rendering</text>
  <text x="770" y="514" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">optional commit-confirm deploy</text>
