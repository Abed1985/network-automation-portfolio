  <text x="230" y="565" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#245a31">edge-a</text>
  <rect x="340" y="525" width="120" height="65" rx="12" fill="#ebf8ef" stroke="#46a35c" stroke-width="2"/>
  <text x="400" y="565" text-anchor="middle" font-family="Arial" font-size="18" font-weight="700" fill="#245a31">edge-b</text>
  <line x1="290" y1="318" x2="340" y2="318" stroke="#526071" stroke-width="4"/>
  <line x1="230" y1="350" x2="230" y2="525" stroke="#526071" stroke-width="4"/>
  <line x1="400" y1="350" x2="400" y2="525" stroke="#526071" stroke-width="4"/>
  <line x1="290" y1="558" x2="340" y2="558" stroke="#526071" stroke-width="4"/>
  <text x="315" y="635" text-anchor="middle" font-family="Arial" font-size="15" fill="#526071">ISIS interfaces rendered from vars/isis_interfaces.yml</text>
