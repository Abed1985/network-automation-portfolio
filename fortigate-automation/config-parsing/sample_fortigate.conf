config firewall address
    edit "trusted-demo-net"
        set subnet 198.51.100.0 255.255.255.0
        set comment "Example trusted network"
    next
    edit "blocked-demo-host-1"
        set subnet 203.0.113.10 255.255.255.255
        set comment "Example blocked host"
    next
end
config firewall policy
    edit 1
        set name "allow-demo-outbound"
        set srcintf "internal"
        set dstintf "wan1"
        set srcaddr "trusted-demo-net"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "HTTPS"
        set logtraffic all
    next
end
