---
- name: Collect Cisco IOS running configuration
  hosts: cisco_ios
  gather_facts: false

  tasks:
    - name: Run show running-config
      cisco.ios.ios_command:
        commands:
          - show running-config
      register: running_config

    - name: Save sanitized lab output per device
      ansible.builtin.copy:
        content: "{{ running_config.stdout[0] }}"
        dest: "artifacts/running-config/{{ inventory_hostname }}.txt"
        mode: "0644"
      delegate_to: localhost
